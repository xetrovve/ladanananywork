<!DOCTYPE html>
<html lang="en" style="--base-size: 12.659200488281252px; --viewport-height: 100vh;">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>ladananany</title>
    
    <style>
        /* ==========================================================================
           1. CARGO CORE FRAMEWORK STYLES
           ========================================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        :focus {
            outline: 0;
        }
        
        html, body {
            min-height: var(--viewport-height, 100vh);
            margin: 0;
            padding: 0;
        }
        
        html {
            font-size: var(--base-size);
            touch-action: manipulation;
            position: relative;
        }
        
        body {
            -moz-osx-font-smoothing: grayscale;
            -webkit-font-smoothing: antialiased;
            display: flex;
            flex-direction: column;
            width: 100%;
            min-height: var(--viewport-height, 100vh);
            justify-content: flex-start;
            position: relative;
            
            /* FIX 1: Loads your custom uploaded backdrop file */
            background-image: url("backdrop.jpg"); 
            background-size: cover;
            background-position: center center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            background-color: #1a1a1a;
            
            /* FIX 2: Switched system font stack to mimic your editor text */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: rgba(255, 255, 255, 0.85);
        }

        /* ==========================================================================
           2. RESPONSIBILITY GRID LAYOUT
           ========================================================================== */
        .content-main {
            width: 100%;
            max-width: 100%;
            margin: 0 auto;
            padding: 4rem 5rem; /* Matches the loose edge margins from the editor */
        }

        .title-text {
            font-size: 1.35rem;
            font-weight: 500;
            display: block;
            margin-bottom: 2rem;
            letter-spacing: -0.2px;
        }

        .column-set {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding-bottom: 1.5rem;
        }

        .column-left {
            flex: 5;
        }

        .column-right {
            flex: 7;
            text-align: right;
        }

        .column-right a {
            color: rgba(255, 255, 255, 0.85);
            text-decoration: none;
            margin-left: 2.5rem;
            font-size: 1.1rem;
            transition: color 0.2s ease;
        }

        .column-right a:hover {
            color: #ffffff;
            text-decoration: underline;
        }

        /* ==========================================================================
           3. PORTFOLIO CENTER IMAGE WORKSPACE (The Floating Poster)
           ========================================================================== */
        .artwork-space {
            margin-top: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            min-height: 50vh;
        }

        .artwork-space img {
            max-width: 320px; /* Limits the poster size to look exactly like the screenshot */
            width: 100%;
            height: auto;
            display: block;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); /* Soft shadow depth */
        }
    </style>
</head>
<body>

    <!-- Outer Site Wrapper -->
    <main class="content-main">

        <!-- Web Browser Readable Column Layout Row -->
        <div class="column-set">
            
            <!-- Top Header Title -->
            <span class="title-text">ladananany work</span>
            
            <!-- Navigation Links -->
            <div class="column-right">
                <a href="information.html">Information</a> 
                <a href="https://instagram.com/ladananany" target="_blank">Instagram</a> 
                <a href="contact-form.html">Email</a>
            </div>

        </div>

        <!-- FIX 4: Replicates the centered artwork poster layer -->
        <section class="artwork-space">
            <img src="poster.jpg" alt="Artwork Display">
        </section>

    </main>

</body>
</html>
